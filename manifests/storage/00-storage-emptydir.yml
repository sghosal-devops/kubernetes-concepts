apiVersion: v1
kind: Pod
metadata:
  name: writer-reader-emptydir
  namespace: nginx-ns
  labels:
    app: storage-emptydir
spec:
  containers:
    - name: writer
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          i=0
          while true; do
            echo "$(date -u +%FT%TZ) count=$i" >> /cache/data.log
            i=$((i+1))
            sleep 5
          done
      volumeMounts:
        - name: shared-cache
          mountPath: /cache
    - name: reader
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          while true; do
            echo "----- latest lines -----"
            tail -n 3 /cache/data.log 2>/dev/null || true
            sleep 7
          done
      volumeMounts:
        - name: shared-cache
          mountPath: /cache
  volumes:
    - name: shared-cache
      emptyDir: {}
