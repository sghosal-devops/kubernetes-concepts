apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx-rs
  namespace: nginx-ns
  labels:
    app: nginx-rs
spec:
  replicas: 3
  selector:
    matchLabels:
      app: busybox-app     # RS adopts any pod with this label
  template:
    metadata:
      labels:
        app: busybox-app   # must match selector.matchLabels
    spec:
      containers:
        - name: busybox
          image: busybox:latest
          command: ["httpd", "-f", "-p", "8080"]
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "500m"
