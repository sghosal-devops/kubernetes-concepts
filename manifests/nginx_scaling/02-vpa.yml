# VPA - Vertical Pod Autoscaler
# Adjusts the CPU/memory REQUESTS of containers automatically
# Does NOT change replica count (that's HPA's job)
#
# NOTE: VPA and HPA should NOT both target CPU/memory on the same deployment
# Use VPA for right-sizing, HPA for scaling out
#
# Install VPA:
#   git clone https://github.com/kubernetes/autoscaler.git
#   cd autoscaler/vertical-pod-autoscaler
#   ./hack/vpa-up.sh

apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: nginx-vpa
  namespace: default
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx-scaling-demo   # must match the deployment name
  updatePolicy:
    updateMode: "Auto"         # options: Off | Initial | Recreate | Auto
    # Off      -> only gives recommendations, no changes applied
    # Initial  -> applies recommendations only on new pods
    # Recreate -> evicts pods to apply new resource values
    # Auto     -> currently same as Recreate
  resourcePolicy:
    containerPolicies:
      - containerName: nginx
        minAllowed:
          cpu: "50m"           # VPA won't go below this
          memory: "32Mi"
        maxAllowed:
          cpu: "1"             # VPA won't go above this
          memory: "512Mi"
        controlledResources:
          - cpu
          - memory
