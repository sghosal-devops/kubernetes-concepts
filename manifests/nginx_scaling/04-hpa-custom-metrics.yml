# HPA with custom/external metrics (advanced)
# Requires: Prometheus Adapter or KEDA installed in the cluster
#
# This example scales based on requests-per-second (custom metric)
# The metric "nginx_requests_per_second" must be exposed via your metrics pipeline

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nginx-hpa-custom
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx-scaling-demo
  minReplicas: 2
  maxReplicas: 20
  metrics:
    # Built-in resource metric
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

    # Custom metric from Prometheus Adapter
    - type: Pods
      pods:
        metric:
          name: nginx_requests_per_second   # must be registered in prometheus-adapter config
        target:
          type: AverageValue
          averageValue: "100"               # scale up when avg RPS per pod > 100
