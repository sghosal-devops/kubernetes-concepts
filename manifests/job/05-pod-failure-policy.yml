apiVersion: batch/v1
kind: Job
metadata:
  name: job-pod-failure-policy-example
  namespace: nginx-ns
spec:
  completions: 12
  parallelism: 3
  backoffLimit: 6
  podFailurePolicy:
    rules:
      - action: FailJob
        onExitCodes:
          containerName: main
          operator: In
          values: [42]
      - action: Ignore
        onPodConditions:
          - type: DisruptionTarget
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: main
          image: bash:5
          command: ["bash"]
          args:
            - -c
            - echo "Hello world"; sleep 5; exit 42
