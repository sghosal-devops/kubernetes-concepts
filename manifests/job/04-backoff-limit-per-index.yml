apiVersion: batch/v1
kind: Job
metadata:
  name: job-backoff-limit-per-index-example
  namespace: nginx-ns
spec:
  completions: 10
  parallelism: 3
  completionMode: Indexed
  backoffLimitPerIndex: 1
  maxFailedIndexes: 5
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: example
          image: python:3.11
          command:
            - python3
            - -c
            - |
              import os
              import sys
              print("Hello world")
              if int(os.environ.get("JOB_COMPLETION_INDEX")) % 2 == 0:
                  sys.exit(1)
