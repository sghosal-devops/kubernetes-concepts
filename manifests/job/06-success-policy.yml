apiVersion: batch/v1
kind: Job
metadata:
  name: job-success
  namespace: nginx-ns
spec:
  parallelism: 10
  completions: 10
  completionMode: Indexed
  successPolicy:
    rules:
      - succeededIndexes: 0,2-3
        succeededCount: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: main
          image: python:3.11
          command:
            - python3
            - -c
            - |
              import os
              import sys
              if os.environ.get("JOB_COMPLETION_INDEX") == "2":
                  sys.exit(0)
              sys.exit(1)
