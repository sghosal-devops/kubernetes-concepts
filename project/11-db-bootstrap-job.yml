apiVersion: batch/v1
kind: Job
metadata:
  name: db-bootstrap
  namespace: project-ns
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: db-bootstrap
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          envFrom:
            - configMapRef:
                name: project-settings
            - secretRef:
                name: postgres-auth
          command:
            - sh
            - -c
            - |
              until pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                echo waiting for postgres readiness
                sleep 2
              done
      containers:
        - name: db-bootstrap
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: project-settings
            - secretRef:
                name: postgres-auth
          command:
            - sh
            - -c
            - |
              psql "postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@$DB_HOST:$DB_PORT/$POSTGRES_DB" <<'SQL'
              create table if not exists app_bootstrap (
                id serial primary key,
                component varchar(64) not null,
                bootstrapped_at timestamptz default now()
              );
              insert into app_bootstrap(component) values ('db-bootstrap-job');
              SQL