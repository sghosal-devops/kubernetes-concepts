apiVersion: batch/v1
kind: CronJob
metadata:
  name: maintenance-heartbeat
  namespace: project-ns
spec:
  schedule: "*/2 * * * *"
  startingDeadlineSeconds: 60
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: maintenance-heartbeat
        spec:
          restartPolicy: OnFailure
          initContainers:
            - name: wait-for-postgres
              image: postgres:16-alpine
              envFrom:
                - configMapRef:
                    name: project-settings
                - secretRef:
                    name: postgres-auth
              command:
                - sh
                - -c
                - |
                  until pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                    echo waiting for postgres readiness
                    sleep 2
                  done
          containers:
            - name: maintenance
              image: python:3.11-slim
              imagePullPolicy: IfNotPresent
              command:
                - sh
                - -c
                - |
                  pip install --no-cache-dir psycopg[binary] && python /app/maintenance.py
              envFrom:
                - configMapRef:
                    name: project-settings
                - secretRef:
                    name: postgres-auth
              volumeMounts:
                - name: backend-code
                  mountPath: /app
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "256Mi"
          volumes:
            - name: backend-code
              configMap:
                name: backend-app
