apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-app
  namespace: project-ns
data:
  app.py: |
    import json
    import os
    import time
    from flask import Flask, jsonify, request
    import psycopg
    import redis

    app = Flask(__name__)

    APP_ENV = os.getenv("APP_ENV", "learning")
    DB_HOST = os.getenv("DB_HOST", "postgres-svc")
    DB_PORT = int(os.getenv("DB_PORT", "5432"))
    DB_NAME = os.getenv("POSTGRES_DB", "notesdb")
    DB_USER = os.getenv("POSTGRES_USER", "notesuser")
    DB_PASSWORD = os.getenv("POSTGRES_PASSWORD", "notespass123")
    REDIS_HOST = os.getenv("REDIS_HOST", "redis-svc")
    REDIS_PORT = int(os.getenv("REDIS_PORT", "6379"))
    REDIS_QUEUE = os.getenv("REDIS_QUEUE", "note-events")
    STATS_CACHE_KEY = "project:stats"

    def get_conn():
      return psycopg.connect(
        host=DB_HOST,
        port=DB_PORT,
        dbname=DB_NAME,
        user=DB_USER,
        password=DB_PASSWORD,
      )

    def get_redis():
      return redis.Redis(
        host=REDIS_HOST,
        port=REDIS_PORT,
        decode_responses=True,
        socket_timeout=2,
      )

    def init_db():
      for _ in range(30):
        try:
          with get_conn() as conn:
            with conn.cursor() as cur:
              cur.execute(
                "create table if not exists notes (id serial primary key, text varchar(255) not null, created_at timestamptz default now())"
              )
              cur.execute(
                "create table if not exists note_audit (id serial primary key, note_id integer not null, event_type varchar(64) not null, payload jsonb not null, created_at timestamptz default now())"
              )
              cur.execute(
                "create table if not exists note_worker_log (id serial primary key, note_id integer, event_type varchar(64) not null, payload jsonb not null, processed_at timestamptz default now())"
              )
              cur.execute(
                "create table if not exists ops_heartbeat (id serial primary key, source varchar(64) not null, status varchar(32) not null, created_at timestamptz default now())"
              )
              conn.commit()
          return
        except Exception:
          time.sleep(2)
      raise RuntimeError("database did not become ready in time")

    def cache_stats(stats):
      try:
        get_redis().setex(STATS_CACHE_KEY, 30, json.dumps(stats))
      except Exception:
        pass

    def load_cached_stats():
      try:
        cached = get_redis().get(STATS_CACHE_KEY)
        if cached:
          payload = json.loads(cached)
          payload["cached"] = True
          return payload
      except Exception:
        return None
      return None

    def invalidate_stats_cache():
      try:
        get_redis().delete(STATS_CACHE_KEY)
      except Exception:
        pass

    def enqueue_event(event):
      try:
        get_redis().rpush(REDIS_QUEUE, json.dumps(event))
        return True
      except Exception:
        return False

    def get_queue_depth():
      try:
        return get_redis().llen(REDIS_QUEUE)
      except Exception:
        return None

    def build_stats_payload():
      cached = load_cached_stats()
      if cached:
        return cached

      with get_conn() as conn:
        with conn.cursor() as cur:
          cur.execute(
            "select count(*), max(created_at) from notes"
          )
          note_count, last_note_at = cur.fetchone()
          cur.execute(
            "select count(*) from note_audit"
          )
          audit_count = cur.fetchone()[0]
          cur.execute(
            "select count(*) from note_worker_log"
          )
          processed_count = cur.fetchone()[0]
          cur.execute(
            "select source, status, created_at from ops_heartbeat order by created_at desc limit 1"
          )
          heartbeat = cur.fetchone()

      stats = {
        "app_env": APP_ENV,
        "note_count": note_count,
        "audit_count": audit_count,
        "processed_count": processed_count,
        "queue_depth": get_queue_depth(),
        "last_note_at": last_note_at.isoformat() if last_note_at else None,
        "latest_heartbeat": {
          "source": heartbeat[0],
          "status": heartbeat[1],
          "created_at": heartbeat[2].isoformat(),
        } if heartbeat else None,
        "cached": False,
      }
      cache_stats(stats)
      return stats

    init_db()

    @app.get("/api")
    def api_root():
      return jsonify({
        "message": "backend api is running",
        "environment": APP_ENV,
        "services": ["postgres", "redis", "worker", "cronjob"],
      })

    @app.get("/api/health")
    def health():
      try:
        with get_conn() as conn:
          with conn.cursor() as cur:
            cur.execute("select 1")
            cur.fetchone()
      except Exception as exc:
        return jsonify({"status": "down", "database": False, "error": str(exc)}), 503

      redis_ok = True
      try:
        get_redis().ping()
      except Exception:
        redis_ok = False

      return jsonify({
        "status": "ok" if redis_ok else "degraded",
        "database": True,
        "redis": redis_ok,
      })

    @app.get("/api/notes")
    def list_notes():
      with get_conn() as conn:
        with conn.cursor() as cur:
          cur.execute("select id, text, created_at from notes order by id desc")
          rows = cur.fetchall()
      return jsonify([
        {"id": row[0], "text": row[1], "created_at": row[2].isoformat()} for row in rows
      ])

    @app.get("/api/audit")
    def list_audit():
      with get_conn() as conn:
        with conn.cursor() as cur:
          cur.execute(
            "select id, note_id, event_type, created_at from note_audit order by id desc limit 10"
          )
          rows = cur.fetchall()
      return jsonify([
        {
          "id": row[0],
          "note_id": row[1],
          "event_type": row[2],
          "created_at": row[3].isoformat(),
        }
        for row in rows
      ])

    @app.get("/api/stats")
    def stats():
      return jsonify(build_stats_payload())

    @app.post("/api/notes")
    def create_note():
      payload = request.get_json(silent=True) or {}
      text = (payload.get("text") or "").strip()
      if not text:
        return jsonify({"error": "text is required"}), 400

      with get_conn() as conn:
        with conn.cursor() as cur:
          cur.execute(
            "insert into notes(text) values (%s) returning id, text, created_at",
            (text,),
          )
          row = cur.fetchone()
          event_payload = json.dumps({"text": row[1], "created_at": row[2].isoformat()})
          cur.execute(
            "insert into note_audit(note_id, event_type, payload) values (%s, %s, %s::jsonb)",
            (row[0], "created", event_payload),
          )
          conn.commit()

      queue_event = {
        "note_id": row[0],
        "event_type": "created",
        "text": row[1],
        "created_at": row[2].isoformat(),
      }
      queued = enqueue_event(queue_event)
      invalidate_stats_cache()

      return jsonify({
        "id": row[0],
        "text": row[1],
        "created_at": row[2].isoformat(),
        "queued_for_processing": queued,
      }), 201

    if __name__ == "__main__":
      app.run(host="0.0.0.0", port=8000)
  worker.py: |
    import json
    import os
    import time
    import psycopg
    import redis

    DB_HOST = os.getenv("DB_HOST", "postgres-svc")
    DB_PORT = int(os.getenv("DB_PORT", "5432"))
    DB_NAME = os.getenv("POSTGRES_DB", "notesdb")
    DB_USER = os.getenv("POSTGRES_USER", "notesuser")
    DB_PASSWORD = os.getenv("POSTGRES_PASSWORD", "notespass123")
    REDIS_HOST = os.getenv("REDIS_HOST", "redis-svc")
    REDIS_PORT = int(os.getenv("REDIS_PORT", "6379"))
    REDIS_QUEUE = os.getenv("REDIS_QUEUE", "note-events")

    def get_conn():
      return psycopg.connect(
        host=DB_HOST,
        port=DB_PORT,
        dbname=DB_NAME,
        user=DB_USER,
        password=DB_PASSWORD,
      )

    def get_redis():
      return redis.Redis(
        host=REDIS_HOST,
        port=REDIS_PORT,
        decode_responses=True,
        socket_timeout=5,
      )

    def wait_for_dependencies():
      for _ in range(40):
        try:
          with get_conn() as conn:
            with conn.cursor() as cur:
              cur.execute("select 1")
              cur.fetchone()
          get_redis().ping()
          return
        except Exception:
          time.sleep(3)
      raise RuntimeError("worker dependencies did not become ready in time")

    def ensure_tables():
      with get_conn() as conn:
        with conn.cursor() as cur:
          cur.execute(
            "create table if not exists note_worker_log (id serial primary key, note_id integer, event_type varchar(64) not null, payload jsonb not null, processed_at timestamptz default now())"
          )
          conn.commit()

    def process_forever():
      redis_client = get_redis()
      while True:
        event = redis_client.blpop(REDIS_QUEUE, timeout=15)
        if not event:
          continue
        payload = json.loads(event[1])
        with get_conn() as conn:
          with conn.cursor() as cur:
            cur.execute(
              "insert into note_worker_log(note_id, event_type, payload) values (%s, %s, %s::jsonb)",
              (payload.get("note_id"), payload.get("event_type", "unknown"), json.dumps(payload)),
            )
            conn.commit()

    if __name__ == "__main__":
      wait_for_dependencies()
      ensure_tables()
      process_forever()
