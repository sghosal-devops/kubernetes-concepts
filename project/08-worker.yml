apiVersion: apps/v1
kind: Deployment
metadata:
  name: note-worker
  namespace: project-ns
  labels:
    app: note-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: note-worker
  template:
    metadata:
      labels:
        app: note-worker
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres-svc 5432; do echo waiting for postgres; sleep 2; done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z redis-svc 6379; do echo waiting for redis; sleep 2; done
      containers:
        - name: worker
          image: python:3.11-slim
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              pip install --no-cache-dir psycopg[binary] redis && python /app/worker.py 2>&1 | tee -a /var/log/app/worker.log
          envFrom:
            - configMapRef:
                name: project-settings
            - secretRef:
                name: postgres-auth
          volumeMounts:
            - name: backend-code
              mountPath: /app
            - name: app-logs
              mountPath: /var/log/app
          resources:
            requests:
              cpu: "75m"
              memory: "96Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
        - name: app-log-collector
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - touch /var/log/app/worker.log; tail -n+1 -F /var/log/app/worker.log
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "64Mi"
      volumes:
        - name: backend-code
          configMap:
            name: backend-app
        - name: app-logs
          emptyDir: {}
